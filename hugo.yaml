baseURL: "https://saneesh.net/"
title: "Saneesh's Blog"
paginate: 5
theme: PaperMod

enableRobotsTXT: true
buildDrafts: false
buildFuture: false
buildExpired: false

minify:
  disableXML: true
  minifyOutput: true

languages:
  en:
    languageName: "English"
    weight: 1
    menu:
      main:
        - name: Archive
          url: archives/
          weight: 5
        - name: Search
          url: search/
          weight: 10
        # - name: Tags
        #  url: tags/
        #  weight: 10
        - name: Projects
          url: /projects/
          weight: 30        
          

outputs:
  home:
    - HTML
    - RSS
    - JSON  # Required for search functionality

params:
  env: production
  title: "Saneesh"
  description: "Thoughts on AI, investing, and philosophy"
  author: "Saneesh"
  authorBio:
    name: "Saneesh"
    bio: "Saneesh writes about AI, tech, investing, and philosophy. He spends his free time reading about personal finance, experimenting with AI tools, and occasionally overthinking the implications of it all. He's been part of the IT industry for close to a decade now."
  mainSections:
    - posts

  images:
    - images/saneesh-og-home.png

  comments: true
  defaultTheme: auto  # Switches between light/dark based on browser
  ShowReadingTime: true
  ShowShareButtons: true
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  ShowWordCount: false
  ShowRssButtonInSectionTermList: true
  UseHugoToc: true
  disableSpecial1stPost: false
  ShowToc: true
  TocOpen: false   # we are keeping the toc closed by default

  homeInfoParams:
    Title: "Hi there!"
    Content: >
      Welcome to my corner of the internet. I'm Saneesh, and this is where I write my thoughts on AI, tech, investing, and philosophy. I also document what I'm learning along the way, from personal finance to the bigger questions about how AI is shaping our world. My projects are published here as well, feel free to explore.

  socialIcons:
    - name: x 
      url: "https://x.com/saneeshnp"
    - name: github
      url: "https://github.com/saneeshnp"
    - name: rss
      url: "index.xml"

  # Security headers
  assets:
    disableFingerprinting: false  # Enables SRI (Subresource Integrity)

  # Search
  fuseOpts:
    isCaseSensitive: false
    shouldSort: true
    location: 0
    distance: 1000
    threshold: 0.4
    minMatchCharLength: 0
    keys: ["title", "permalink", "summary", "content"]